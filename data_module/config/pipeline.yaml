pipeline:
  # Chunking
  default_chunk_strategy: canonical_qa   # canonical_qa | per_answer | multi_hop | hierarchical
  max_chunk_tokens: 512
  chunk_overlap_tokens: 64

  # Embedding
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  embedding_batch_size: 256
  embedding_device: cpu        # cpu | cuda | mps
  # Alternative models:
  # - sentence-transformers/all-mpnet-base-v2  (better quality, slower)
  # - text-embedding-3-small  (OpenAI, requires OPENAI_API_KEY)

  # NER / enrichment
  spacy_model: en_core_web_sm  # en_core_web_sm | en_core_web_trf
  spacy_batch_size: 128         # texts per spaCy batch (64-128 is sweet spot)
  spacy_n_process: 1           # CPU cores for NER; keep 1 on macOS to avoid fork issues
  run_ner: true
  run_entity_linking: false    # requires Wikidata index; set true after wikidata loaded

  # Text cleaning
  strip_html: true
  normalize_whitespace: true
  min_text_length: 20          # skip very short texts

  # Deduplication
  dedup_exact: true            # SHA256 content hash
  dedup_semantic: false        # embedding similarity dedup (expensive)
  dedup_semantic_threshold: 0.97

  # Parallelism
  num_workers: 4
  batch_size: 1000             # records per batch in pipeline

  # Wikidata → NetworkX: save graph.pkl.gz + partial checkpoint every N triple-batch flushes (0 = only at end of run)
  wikidata_save_every_batches: 5
